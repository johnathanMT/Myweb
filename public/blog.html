<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Blog | MTN.Digitosphere</title>
  <meta name="description" content="Thoughts on code, care, and everything between — by Myo Thant Naing." />

  <!-- Open Graph (Facebook, LinkedIn) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="MTN.Digitosphere" />
  <meta property="og:title" content="The Blog | MTN.Digitosphere" />
  <meta property="og:description" content="Thoughts on code, care, and everything between — by Myo Thant Naing." />
  <meta property="og:image" content="https://johnathanmt.github.io/Myweb/Myweb_photo/My_profile2_for_myweb.jpg" />
  <meta property="og:url" content="https://johnathanmt.github.io/Myweb/blog.html" />
  <!-- Twitter/X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="The Blog | MTN.Digitosphere" />
  <meta name="twitter:description" content="Thoughts on code, care, and everything between." />
  <meta name="twitter:image" content="https://johnathanmt.github.io/Myweb/Myweb_photo/My_profile2_for_myweb.jpg" />

  <style>
    :root{--bg:#0a0e14;--bg-soft:#111722;--card:#131a26;--border:#1f2937;--text:#e6edf3;
      --muted:#8b97a7;--accent:#4be1a0;--accent-dim:#2f9c70;--radius:14px;
      --mono:ui-monospace,"SF Mono",Consolas,monospace;--sans:"Inter",system-ui,sans-serif;}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.6;
      background-image:radial-gradient(900px 500px at 80% -10%,rgba(75,225,160,.08),transparent 60%)}
    a{color:var(--accent);text-decoration:none}
    nav{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;
      padding:14px 24px;backdrop-filter:blur(10px);background:rgba(10,14,20,.72);border-bottom:1px solid var(--border)}
    .brand{font-family:var(--mono);font-weight:700}.brand span{color:var(--accent)}
    .nav-links a{color:var(--muted);margin-left:20px;font-size:14px}.nav-links a:hover{color:var(--text)}
    .wrap{max-width:820px;margin:0 auto;padding:40px 20px 80px}
    header.page h1{font-size:2.2rem;margin:0 0 6px}.accent{color:var(--accent)}
    header.page .sub{color:var(--muted);font-family:var(--mono);font-size:14px;margin-bottom:24px}
    .searchbar{display:flex;gap:10px;margin:18px 0 26px}
    .searchbar input{flex:1;background:var(--bg-soft);border:1px solid var(--border);color:var(--text);
      padding:10px 13px;border-radius:9px}
    .searchbar input:focus{outline:none;border-color:var(--accent-dim)}
    .article{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
      padding:22px 24px;margin-bottom:18px;transition:transform .15s,border-color .15s}
    .article:hover{transform:translateY(-2px);border-color:var(--accent-dim)}
    .article h2{margin:0 0 6px;font-size:1.35rem}
    .meta{color:var(--muted);font-size:13px;font-family:var(--mono);margin-bottom:12px}
    .meta b{color:var(--accent);font-weight:600}
    .tags{margin:10px 0 0}
    .tag{display:inline-block;font-size:12px;font-family:var(--mono);color:var(--accent);
      border:1px solid var(--accent-dim);border-radius:999px;padding:2px 10px;margin:0 6px 6px 0}
    .article img.cover{width:100%;border-radius:10px;margin:12px 0;display:block}
    .body{white-space:pre-wrap}
    .body.clamp{max-height:8.5em;overflow:hidden;-webkit-mask-image:linear-gradient(180deg,#000 60%,transparent)}
    .readmore{background:none;border:none;color:var(--accent);cursor:pointer;padding:8px 0 0;
      font-family:var(--mono);font-size:13px}
    .empty,.spin{color:var(--muted);text-align:center;padding:40px 0;font-family:var(--mono)}
  </style>
</head>
<body>
  <nav>
    <div class="brand">MTN<span>.Digitosphere</span></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="index.html#portfolio">Projects</a>
      <a href="blog.html">Blog</a>
    </div>
  </nav>

  <div class="wrap">
    <header class="page">
      <h1>The <span class="accent">Blog</span></h1>
      <div class="sub">// thoughts on code, care, and everything between</div>
    </header>

    <div class="searchbar">
      <input id="search" placeholder="Search articles…" onkeydown="if(event.key==='Enter')loadArticles()" />
      <button class="readmore" style="font-family:var(--sans)" onclick="loadArticles()">Search</button>
    </div>

    <div id="list"><div class="spin">Loading articles…</div></div>
  </div>

  <!-- Shared API client (in /public, served at /Myweb/api.js) -->
  <script src="api.js"></script>
  <script>
    const $=(id)=>document.getElementById(id);
    const esc=(s)=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    const fmt=(s)=>{try{return new Date(s).toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"})}catch{return""}};

    function tagsHtml(t){ if(!t)return""; return `<div class="tags">`+
      t.split(",").map(x=>x.trim()).filter(Boolean).map(x=>`<span class="tag">#${esc(x)}</span>`).join("")+`</div>`; }

    function card(a){
      const long=(a.content||"").length>320;
      const cover=a.imageUrl?`<img class="cover" src="${esc(a.imageUrl)}" alt="">`:"";
      return `<article class="article">
        <h2>${esc(a.title||"Untitled")}</h2>
        <div class="meta">by <b>${esc(a.author||"Unknown")}</b> · ${fmt(a.publishedDate||a.createdAt)}</div>
        ${cover}
        <div class="body ${long?"clamp":""}">${esc(a.content||"")}</div>
        ${long?`<button class="readmore" onclick="toggle(this)">Read more ▾</button>`:""}
        ${tagsHtml(a.tags)}
      </article>`;
    }
    function toggle(b){const body=b.previousElementSibling;const open=!body.classList.contains("clamp");
      body.classList.toggle("clamp");b.textContent=open?"Read more ▾":"Show less ▴";}

    async function loadArticles(){
      const search=$("search").value.trim()||undefined;
      try{
        const resp=await PortfolioAPI.getArticles({page:1,pageSize:50,published:true,search});
        const items=resp?.data?.items??[];
        $("list").innerHTML=items.length?items.map(card).join(""):`<div class="empty">No articles found.</div>`;
      }catch(e){ $("list").innerHTML=`<div class="empty">Couldn't load articles.<br>${esc(e.message)}</div>`; }
    }

    PortfolioAPI.wakeBackend();
    loadArticles();
  </script>
</body>
</html>
