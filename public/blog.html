<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Strict CSP: locked to 'self' + the exact Google Translate domains.
       script-src has NO 'unsafe-inline' (all JS is external: api.js + blog.js).
       style-src keeps 'unsafe-inline' only because Google Translate injects
       inline styles for the translated text. GitHub Pages can't set HTTP headers,
       so the policy is delivered as a <meta> tag. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' https://translate.google.com https://translate.googleapis.com https://www.gstatic.com https://*.gstatic.com https://*.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://www.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; media-src 'self' https://res.cloudinary.com blob:; connect-src 'self' https://myweb-zqv1.onrender.com https://translate.googleapis.com https://translate.google.com; frame-src https://translate.google.com https://www.google.com">

  <title>The Blog | MTN.Digitosphere</title>
  <meta name="description" content="Thoughts on code, care, and everything between — by Myo Thant Naing." />

  <!-- Open Graph (site-level; per-article rich previews come from the API /share/{id}) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="MTN.Digitosphere" />
  <meta property="og:title" content="The Blog | MTN.Digitosphere" />
  <meta property="og:description" content="Thoughts on code, care, and everything between." />
  <meta property="og:image" content="https://johnathanmt.github.io/Myweb/Myweb_photo/My_profile2_for_myweb.jpg" />
  <meta property="og:url" content="https://johnathanmt.github.io/Myweb/blog.html" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg:#07070f; --panel:rgba(18,22,34,.55); --glass:rgba(255,255,255,.05);
      --text:#e9eef7; --muted:#8b97a7; --line:rgba(255,255,255,.10);
      --cyan:#00e5ff; --magenta:#ff3df0; --violet:#7c3aed; --blue:#4b7bff;
      --serif:"Playfair Display",Georgia,serif; --sans:"Inter",system-ui,sans-serif;
      --mono:"Fira Code",ui-monospace,monospace;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.7;overflow-x:hidden}
    a{color:var(--cyan);text-decoration:none}
    img{max-width:100%;display:block}

    .ambient{position:fixed;inset:0;z-index:-2;pointer-events:none;overflow:hidden}
    .ambient i{position:absolute;border-radius:50%;filter:blur(140px);opacity:.5}
    .ambient .c1{top:-12%;left:18%;width:34rem;height:34rem;background:rgba(0,229,255,.14)}
    .ambient .c2{top:32%;right:-10%;width:36rem;height:36rem;background:rgba(124,58,237,.16)}
    .ambient .c3{top:64%;left:-10%;width:32rem;height:32rem;background:rgba(255,61,240,.12)}
    .vignette{position:fixed;inset:0;z-index:-1;pointer-events:none;
      background:radial-gradient(120% 90% at 50% 50%,transparent 55%,rgba(0,0,0,.6) 100%)}

    nav{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;
      padding:14px 24px;background:rgba(7,7,15,.7);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
    .brand{font-family:var(--mono);font-weight:700}.brand span{color:var(--cyan)}
    .nav-links a{color:var(--muted);margin-left:20px;font-size:14px}.nav-links a:hover{color:var(--text)}
    .navright{display:flex;align-items:center;gap:16px}
    .langsw{display:flex;gap:3px;background:var(--glass);border:1px solid var(--line);
      border-radius:999px;padding:4px;backdrop-filter:blur(10px)}
    .langsw button{border:none;background:transparent;color:var(--muted);font-family:var(--mono);
      font-size:12px;padding:5px 11px;border-radius:999px;cursor:pointer;transition:.2s;white-space:nowrap}
    .langsw button:hover{color:#fff}
    .langsw button.active{background:linear-gradient(90deg,var(--cyan),var(--blue));color:#04121a;
      font-weight:700;box-shadow:0 0 14px rgba(0,229,255,.45)}
    /* hide Google Translate's default chrome — we drive it with our own UI */
    .goog-te-banner-frame.skiptranslate, iframe.skiptranslate{display:none!important;visibility:hidden!important}
    .goog-te-gadget{height:0!important;overflow:hidden!important;font-size:0!important}
    #goog-gt-tt, .goog-te-balloon-frame, .goog-tooltip{display:none!important}
    .goog-text-highlight{background:none!important;box-shadow:none!important}
    body{top:0!important;position:static!important}
    .wrap{max-width:1080px;margin:0 auto;padding:0 20px}

    /* ===== LIST VIEW ===== */
    .list-head{padding:56px 0 28px;text-align:center}
    .list-head h1{font-size:2.6rem;margin:0}.list-head h1 b{color:var(--cyan)}
    .list-head .sub{color:var(--muted);font-family:var(--mono);font-size:14px}
    .searchbar{display:flex;gap:10px;max-width:560px;margin:22px auto 0}
    .searchbar input{flex:1;background:var(--glass);border:1px solid var(--line);color:var(--text);
      padding:11px 14px;border-radius:10px;backdrop-filter:blur(8px)}
    .searchbar input:focus{outline:none;border-color:var(--cyan)}
    .searchbar button{border:1px solid var(--line);background:transparent;color:var(--cyan);border-radius:10px;padding:0 18px;cursor:pointer;font-family:var(--mono)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:26px;padding:30px 0 90px}
    .card{position:relative;border:1px solid var(--line);background:var(--glass);backdrop-filter:blur(16px);
      border-radius:20px;overflow:hidden;cursor:pointer;transition:transform .3s,border-color .3s,box-shadow .3s;display:flex;flex-direction:column}
    .card:hover{transform:translateY(-8px);border-color:rgba(0,229,255,.4);box-shadow:0 30px 60px -18px rgba(0,229,255,.28)}
    .card .ph{aspect-ratio:16/10;overflow:hidden}
    .card .ph img{width:100%;height:100%;object-fit:cover;transition:transform .6s}
    .card:hover .ph img{transform:scale(1.06)}
    .card .body{padding:18px 20px;flex:1;display:flex;flex-direction:column}
    .card .meta{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--cyan);text-transform:uppercase;margin-bottom:8px}
    .card h3{margin:0 0 8px;font-size:1.15rem;line-height:1.35}
    .card p{margin:0;color:var(--muted);font-size:.9rem;flex:1}
    .card .foot{display:flex;gap:16px;color:var(--muted);font-size:.85rem;margin-top:14px;font-family:var(--mono)}

    /* ===== ARTICLE (EDITORIAL) VIEW ===== */
    .article{padding-bottom:100px}
    .hero{position:relative;display:flex;align-items:center;justify-content:center;
      width:100%;min-height:38vh;max-height:80vh;overflow:hidden;
      background:radial-gradient(60% 80% at 50% 28%,rgba(0,229,255,.07),transparent 70%)}
    .hero img{width:100%;height:auto;max-height:80vh;object-fit:contain;object-position:center}
    .hero::after{content:"";position:absolute;left:0;right:0;bottom:0;height:42%;pointer-events:none;
      background:linear-gradient(180deg,transparent,rgba(7,7,15,.92))}
    .hero .kicker{position:absolute;left:0;right:0;top:22px;text-align:center;z-index:2;
      font-family:var(--mono);font-size:12px;letter-spacing:.35em;text-transform:uppercase;color:var(--cyan)}
    .headpane{position:relative;z-index:3;max-width:820px;margin:-56px auto 0;padding:34px 40px;
      background:var(--panel);backdrop-filter:blur(18px) saturate(140%);
      border:1px solid rgba(0,229,255,.22);border-radius:20px;
      box-shadow:0 0 0 1px rgba(255,255,255,.03) inset,0 40px 80px rgba(0,0,0,.55),0 0 40px rgba(0,229,255,.10)}
    .headpane h1{font-family:var(--serif);font-weight:700;font-size:clamp(1.7rem,4vw,2.8rem);line-height:1.18;margin:.2rem 0 .6rem}
    .headpane .by{font-family:var(--mono);font-size:13px;color:var(--muted)}
    .headpane .by b{color:var(--cyan);font-weight:500}
    .tags{margin-top:14px;display:flex;flex-wrap:wrap;gap:8px}
    .tag{font-family:var(--mono);font-size:12px;color:var(--cyan);border:1px solid rgba(0,229,255,.3);border-radius:999px;padding:3px 11px}

    /* ===== "REVENGE POP" multi-image gallery ===== */
    .popwrap{max-width:1180px;margin:54px auto 0;padding:0 8px}
    .popwrap .lbl{font-family:var(--mono);font-size:12px;letter-spacing:.25em;text-transform:uppercase;
      color:var(--magenta);text-align:center;margin-bottom:18px}
    .popwrap .lbl b{color:var(--cyan)}
    .popgal{display:flex;align-items:center;gap:0;overflow-x:auto;padding:40px 24px 50px;
      scroll-snap-type:x proximity;
      -webkit-mask-image:linear-gradient(90deg,transparent,#000 5%,#000 95%,transparent);
              mask-image:linear-gradient(90deg,transparent,#000 5%,#000 95%,transparent)}
    .popgal::-webkit-scrollbar{height:8px}
    .popgal::-webkit-scrollbar-thumb{background:rgba(0,229,255,.4);border-radius:4px}
    .popitem{flex:0 0 auto;width:clamp(220px,34vw,400px);height:300px;border-radius:18px;overflow:hidden;
      cursor:zoom-in;scroll-snap-align:center;position:relative;
      border:2px solid var(--cyan);
      box-shadow:0 0 0 5px rgba(0,229,255,.08),0 24px 50px rgba(0,0,0,.55),0 0 30px rgba(0,229,255,.30);
      transform:rotate(-2.5deg);transition:transform .35s ease,box-shadow .35s,filter .35s}
    .popitem:not(:first-child){margin-left:-34px}
    .popitem img{width:100%;height:100%;object-fit:cover}
    .popitem video{width:100%;height:100%;object-fit:cover;background:#000}
    .popitem.popvideo{cursor:default;width:clamp(280px,46vw,520px)}
    .popitem:nth-child(2n){border-color:var(--magenta);transform:rotate(2.5deg);height:360px;margin-top:-30px;
      box-shadow:0 0 0 5px rgba(255,61,240,.08),0 24px 50px rgba(0,0,0,.55),0 0 30px rgba(255,61,240,.32)}
    .popitem:nth-child(3n){transform:rotate(-1deg);height:250px;margin-top:34px;
      border-color:var(--blue);box-shadow:0 0 0 5px rgba(75,123,255,.08),0 24px 50px rgba(0,0,0,.55),0 0 30px rgba(75,123,255,.3)}
    .popitem:nth-child(4n){height:330px}
    .popitem:hover{transform:rotate(0) scale(1.05);z-index:5;filter:saturate(1.15)}
    .popitem::after{content:"";position:absolute;inset:0;border-radius:16px;pointer-events:none;
      background:linear-gradient(120deg,transparent 60%,rgba(255,255,255,.18))}
    .pop-badge{position:absolute;top:-14px;left:-10px;z-index:6;font-family:var(--mono);font-weight:700;
      font-size:13px;color:#04121a;background:var(--cyan);padding:4px 12px;border-radius:999px;
      transform:rotate(-8deg);box-shadow:0 0 18px rgba(0,229,255,.6)}

    /* lightbox */
    .lb{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
      background:rgba(3,4,8,.93);backdrop-filter:blur(6px);padding:4vw}
    .lb.open{display:flex}
    .lb img{max-width:92vw;max-height:88vh;border-radius:14px;border:2px solid var(--cyan);
      box-shadow:0 0 50px rgba(0,229,255,.4)}
    .lb .x{position:absolute;top:16px;right:24px;font-size:2.2rem;color:#fff;cursor:pointer;line-height:1}

    /* staggered editorial body — frosted panes with neon edge lighting */
    .body-editorial{max-width:880px;margin:56px auto 0;display:flex;flex-direction:column;gap:30px}
    .pane{position:relative;background:var(--glass);backdrop-filter:blur(14px);
      border:1px solid var(--line);border-radius:16px;padding:26px 30px;font-size:1.06rem;color:#dfe6f0;white-space:pre-wrap}
    .pane::before{content:"";position:absolute;top:14px;bottom:14px;width:2px;border-radius:2px}
    .pane:nth-child(odd){align-self:flex-start;width:min(96%,720px)}
    .pane:nth-child(odd)::before{left:-1px;background:linear-gradient(var(--cyan),transparent);box-shadow:0 0 16px var(--cyan)}
    .pane:nth-child(even){align-self:flex-end;width:min(96%,720px)}
    .pane:nth-child(even)::before{right:-1px;background:linear-gradient(var(--magenta),transparent);box-shadow:0 0 16px var(--magenta)}
    .pull{font-family:var(--serif);font-style:italic;font-size:clamp(1.3rem,3vw,1.9rem);
      text-align:center;color:#fff;max-width:760px;margin:8px auto;padding:10px 20px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}

    .interactions{max-width:880px;margin:60px auto 0;border:1px solid var(--line);border-radius:20px;background:var(--glass);backdrop-filter:blur(16px);padding:22px 26px}
    .ix-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
    .ix-btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:transparent;color:var(--text);border-radius:999px;padding:9px 16px;cursor:pointer;font-size:.95rem;transition:.2s}
    .ix-btn:hover{border-color:var(--cyan)}
    .ix-btn.liked{color:#ff5d8f;border-color:#ff5d8f55;background:rgba(255,93,143,.08)}
    .share{display:flex;gap:8px}
    .share button{width:40px;height:40px;border-radius:12px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;font-size:1rem;transition:.2s}
    .share button:hover{color:var(--cyan);border-color:var(--cyan)}
    .reactions{margin-top:18px;border-top:1px solid var(--line);padding-top:18px}
    .reactions .lbl{font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
    .chips{display:flex;flex-wrap:wrap;gap:10px}
    .chip{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--glass);color:#e6edf7;border-radius:999px;padding:8px 14px;cursor:pointer;font-size:.92rem;transition:.18s}
    .chip:hover{border-color:var(--cyan);transform:translateY(-2px)}
    .chip.sent{border-color:var(--cyan);background:rgba(0,229,255,.14);color:#fff}
    .chip .n{color:var(--cyan);font-size:.8rem}

    .center{text-align:center}.muted{color:var(--muted)}
    .spin{padding:80px 0;text-align:center;color:var(--muted);font-family:var(--mono)}
    .backlink{display:inline-flex;gap:8px;align-items:center;color:var(--muted);font-family:var(--mono);font-size:13px;margin:18px 0}
    .backlink:hover{color:var(--cyan)}

    @media(max-width:640px){
      .headpane{margin-top:-40px;padding:24px 20px}
      .pane{padding:22px 20px}
      .pane:nth-child(odd),.pane:nth-child(even){width:100%}
      .popitem{width:78vw;height:280px}
      .popitem:nth-child(2n){height:300px}
    }
  </style>
</head>
<body>
  <div class="ambient"><i class="c1"></i><i class="c2"></i><i class="c3"></i></div>
  <div class="vignette"></div>

  <nav>
    <div class="brand">MTN<span>.Digitosphere</span></div>
    <div class="navright">
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="index.html#projects">Projects</a>
        <a href="blog.html">Blog</a>
      </div>
      <!-- custom translation switcher (wired in blog.js; kept untranslated) -->
      <div class="langsw notranslate" translate="no">
        <button data-lang="en">EN</button>
        <button data-lang="ja">日本語</button>
        <button data-lang="my">မြန်မာ</button>
      </div>
    </div>
  </nav>

  <div id="app" class="wrap"><div class="spin">Loading…</div></div>

  <!-- lightbox -->
  <div class="lb" id="lb"><span class="x" id="lbx">×</span><img id="lbimg" src="" alt=""></div>

  <!-- All logic is external (no inline scripts) so the CSP can use script-src 'self'. -->
  <!-- defer = run in order after the DOM is parsed -->
  <script defer src="api.js"></script>
  <script defer src="blog.js"></script>

  <!-- Google Translate engine — blog.js defines window.googleTranslateElementInit -->
  <div id="google_translate_element" class="notranslate" style="position:absolute;left:-9999px;top:-9999px"></div>
  <script defer src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
