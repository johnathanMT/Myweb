<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Strict CSP, with the additions WebGL/Three.js need:
         • script-src 'wasm-unsafe-eval' → the Draco decoder is WebAssembly.
         • worker-src 'self' blob:        → the Draco/GLTF loader runs a blob worker.
         • img-src blob:                  → GLTFLoader decodes textures to blob URLs.
         • connect-src gstatic            → the Draco decoder is fetched from gstatic. -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        base-uri 'self';
        object-src 'none';
        script-src 'self' 'wasm-unsafe-eval';
        worker-src 'self' blob:;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
        font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com;
        img-src 'self' data: blob: https:;
        media-src 'self' https://res.cloudinary.com blob:;
        connect-src 'self' https://myweb-zqv1.onrender.com https://www.gstatic.com https://api.unsplash.com https://ipapi.co;
    ">

    <meta name="description"
        content="Myo Thant Naing — IT Student, Aspiring AI Engineer, living in Japan. From caring to coding." />
    <title>MTN · Myo Thant Naing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;600&family=Padauk:wght@400;700&family=Noto+Sans+Myanmar:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
